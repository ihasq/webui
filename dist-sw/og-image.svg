<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020304"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Chat bubble icon -->
  <g transform="translate(500, 200)">
    <rect x="0" y="0" width="200" height="150" rx="20" fill="#3b82f6" opacity="0.9"/>
    <polygon points="30,150 30,180 60,150" fill="#3b82f6" opacity="0.9"/>
    <!-- Dots representing typing -->
    <circle cx="60" cy="75" r="12" fill="white" opacity="0.8"/>
    <circle cx="100" cy="75" r="12" fill="white" opacity="0.6"/>
    <circle cx="140" cy="75" r="12" fill="white" opacity="0.4"/>
  </g>

  <!-- Title -->
  <text x="600" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="bold" fill="white" text-anchor="middle">Chat</text>

  <!-- Subtitle -->
  <text x="600" y="510" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#9ca3af" text-anchor="middle">AI Chat Interface for Local &amp; Cloud LLMs</text>
</svg>
