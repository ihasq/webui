  <head>
    <meta charset="UTF-8" />

    <!-- Open Graph / Facebook -->

    <meta name="twitter:description" content="A fast, privacy-focused AI chat interface. Connect to local LLMs like Ollama or cloud providers like OpenAI, Anthropic, and more." />
    <meta name="twitter:image" content="/og-image.svg" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#020304" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png" />

    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileColor" content="#020304" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Chat",
      "description": "A fast, privacy-focused AI chat interface. Connect to local LLMs like Ollama or cloud providers like OpenAI, Anthropic, and more.",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Local LLM support (Ollama)",
        "Cloud provider integration (OpenAI, Anthropic, Google)",
        "Offline support (PWA)",
        "Privacy-focused",
        "Conversation history",
        "Dark mode",
        "Mobile-friendly"
      ],
      "screenshot": "/og-image.svg",
      "softwareVersion": "1.0.0",
      "author": {
        "@type": "Person",
        "name": "ihasq"
      }
    }
    </script>

    <!-- Preconnect to common LLM API endpoints -->
    <link rel="preconnect" href="https://api.openai.com" />
    <link rel="preconnect" href="https://api.anthropic.com" />
    <link rel="dns-prefetch" href="https://openrouter.ai" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { color-scheme: light dark; }
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: light-dark(#ffffff, #020304);
        color: light-dark(#020304, #ffffff);
      }
      .loader {
        text-align: center;
        padding: 2rem;
      }
      .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid light-dark(#e5e7eb, #374151);
        border-top-color: light-dark(#3b82f6, #60a5fa);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 1.5rem;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .status { font-size: 0.875rem; color: light-dark(#6b7280, #9ca3af); }
      .progress {
        width: 200px;
        height: 4px;
        background: light-dark(#e5e7eb, #374151);
        border-radius: 2px;
        margin: 1rem auto 0;
        overflow: hidden;
      }
      .progress-bar {
        height: 100%;
        background: light-dark(#3b82f6, #60a5fa);
        width: 0%;
        transition: width 0.3s ease;
      }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <noscript>
      <div style="padding: 2rem; text-align: center;">
        <h1>Chat - AI Chat Interface</h1>
        <p>This application requires JavaScript to run. Please enable JavaScript in your browser settings.</p>
      </div>
    </noscript>

    <div class="loader" id="loader">
      <div class="spinner"></div>
      <div class="status" id="status">Initializing...</div>
      <div class="progress" id="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>

    <script>
      (async function() {
        const status = document.getElementById('status');
        const progressBar = document.getElementById('progress-bar');

        function setStatus(text) {
          status.textContent = text;
        }

        function setProgress(percent) {
          progressBar.style.width = percent + '%';
        }

        if (!('serviceWorker' in navigator)) {
          setStatus('Service Worker not supported. Please use a modern browser.');
          return;
        }

        try {
          setStatus('Registering service worker...');
          const registration = await navigator.serviceWorker.register('/sw.js');

          // Wait for the service worker to be ready
          if (registration.installing) {
            setStatus('Installing...');
            const sw = registration.installing;

            // Listen for state changes
            sw.addEventListener('statechange', () => {
              if (sw.state === 'installed') {
                setStatus('Installed, activating...');
              } else if (sw.state === 'activated') {
                setStatus('Ready!');
                setTimeout(() => location.reload(), 500);
              }
            });

            // Listen for progress messages from SW
            navigator.serviceWorker.addEventListener('message', (event) => {
              if (event.data?.type === 'INSTALL_PROGRESS') {
                const { phase, progress, message } = event.data;
                setStatus(message || phase);
                if (progress !== undefined) {
                  setProgress(progress);
                }
              }
            });
          } else if (registration.waiting) {
            setStatus('Update available, activating...');
            registration.waiting.postMessage({ type: 'SKIP_WAITING' });
          } else if (registration.active) {
            // Already installed, load the app
            setStatus('Loading application...');
            location.reload();
          }
        } catch (err) {
          setStatus('Failed to initialize: ' + err.message);
          console.error('SW registration failed:', err);
        }
      })();
    </script>
  </body>
</html>
